version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nabeh_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '0000'
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: nabeh_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:0000@db:5432/mydb?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
